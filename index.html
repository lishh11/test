<style>
body {
font-family: Arial, sans-serif;
margin: 0;
padding: 20px;
background: #fff;
color: #111;
}

header {
display: flex;
justify-content: space-around;
margin-bottom: 20px;
}

header a {
text-decoration: none;
padding: 12px 18px;
border-radius: 22px;
color: #111;
font-weight: 600;
transition: 0.2s;
}

header a.active {
background: #0b274d;
color: #fff;
}

.bank-list {
margin-top: 30px;
display: grid;
grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
gap: 15px;
}

.bank-item {
display: flex;
align-items: center;
gap: 10px;
padding: 12px;
border: 1px solid #ddd;
border-radius: 10px;
cursor: pointer;
transition: 0.2s;
background: #fafafa;
}

.bank-item:hover {
background: #f0f4fa;
}

.bank-item img {
width: 40px;
height: 40px;
object-fit: contain;
border-radius: 5px;
background: #fff;
}

.bank-item span {
font-size: 15px;
font-weight: 500;
color: #0b274d;
}

.overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(11,39,77,0.6);
display: none;
align-items: center;
justify-content: center;
flex-direction: column;
z-index: 9999;
}

.spinner {
width: 50px;
height: 50px;
border: 4px solid rgba(255,255,255,0.3);
border-top: 4px solid orange;
border-radius: 50%;
animation: spin 1s linear infinite;
margin-bottom: 15px;
}

.loading-text {
font-size: 16px;
color: #fff;
}

@keyframes spin {
0% {transform: rotate(0deg);}
100% {transform: rotate(360deg);}
}
</style>
</head>

<script>
function showLoadingAndRedirect(url){
const overlay=document.getElementById("loadingOverlay");
overlay.style.display="flex";
setTimeout(()=>{
overlay.style.display="none";
window.location.href=url;
},2000);
}

window.addEventListener("pageshow",function(){
document.getElementById("loadingOverlay").style.display="none";
});
</script>
